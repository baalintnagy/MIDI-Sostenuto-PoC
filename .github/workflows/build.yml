name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        
    - name: Build with Maven
      run: mvn clean package -Pwindows

    - name: Verify build output        # ← helps debug if exe is missing
      run: dir target\jpackage-out\
      
    - name: Upload executable as artifact
      uses: actions/upload-artifact@v3
      with:
        name: sustsos-exe
        path: target/jpackage-out/SustSos.exe
        if-no-files-found: error        # ← fails loudly if exe is missing
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: target/jpackage-out/SustSos.exe
        fail_on_unmatched_files: true   # ← fails loudly if exe is missing
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}